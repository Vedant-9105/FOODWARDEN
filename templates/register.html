 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - AI Food Hygiene Checker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #4361ee;
      --secondary: #3f37c9;
      --accent: #4cc9f0;
      --light: #f8f9fa;
      --dark: #212529;
      --success: #4ade80;
      --warning: #fbbf24;
      --danger: #f87171;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }
    
    .floating-shapes {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    
    .shape {
      position: absolute;
      border-radius: 50%;
      opacity: 0.1;
      animation: float 15s infinite linear;
    }
    
    .shape-1 {
      width: 200px;
      height: 200px;
      background: var(--accent);
      top: 10%;
      left: 10%;
      animation-delay: 0s;
    }
    
    .shape-2 {
      width: 150px;
      height: 150px;
      background: var(--primary);
      top: 60%;
      right: 10%;
      animation-delay: 3s;
    }
    
    .shape-3 {
      width: 100px;
      height: 100px;
      background: var(--success);
      bottom: 20%;
      left: 20%;
      animation-delay: 6s;
    }
    
    .shape-4 {
      width: 120px;
      height: 120px;
      background: var(--warning);
      top: 30%;
      right: 30%;
      animation-delay: 9s;
    }
    
    @keyframes float {
      0% {
        transform: translateY(0) rotate(0deg);
      }
      50% {
        transform: translateY(-20px) rotate(180deg);
      }
      100% {
        transform: translateY(0) rotate(360deg);
      }
    }
    
    .container {
      max-width: 450px;
      width: 100%;
    }
    
    .card {
      border-radius: 20px;
      border: none;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      animation: cardEntrance 0.8s ease-out;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
    }
    
    @keyframes cardEntrance {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .card-header {
      background: linear-gradient(to right, var(--primary), var(--secondary));
      color: white;
      text-align: center;
      padding: 30px 20px;
      border-bottom: none;
      position: relative;
      overflow: hidden;
    }
    
    .card-header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
      transform: rotate(30deg);
    }
    
    .card-body {
      padding: 30px;
    }
    
    .logo {
      font-size: 3.5rem;
      margin-bottom: 10px;
      display: block;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }
    
    .card-title {
      font-weight: 700;
      font-size: 1.8rem;
      margin-bottom: 5px;
    }
    
    .card-subtitle {
      opacity: 0.9;
      font-weight: 400;
    }
    
    .form-label {
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
    }
    
    .form-label i {
      margin-right: 8px;
      color: var(--primary);
    }
    
    .form-control {
      border-radius: 10px;
      padding: 12px 15px;
      border: 1px solid #e1e5ee;
      transition: all 0.3s ease;
    }
    
    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 0.25rem rgba(67, 97, 238, 0.25);
      transform: translateY(-2px);
    }
    
    .input-group .btn {
      border-radius: 0 10px 10px 0;
      border: 1px solid #e1e5ee;
      border-left: none;
      transition: all 0.3s ease;
    }
    
    .input-group .btn:hover {
      background-color: #f8f9fa;
      color: var(--primary);
    }
    
    .password-requirements {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 15px;
      margin-top: 10px;
      font-size: 0.85rem;
    }
    
    .requirement {
      display: flex;
      align-items: center;
      margin-bottom: 5px;
      transition: all 0.3s ease;
    }
    
    .requirement i {
      margin-right: 8px;
      width: 16px;
      text-align: center;
    }
    
    .requirement.met {
      color: var(--success);
    }
    
    .requirement.unmet {
      color: #6c757d;
    }
    
    .btn-primary {
      background: linear-gradient(to right, var(--primary), var(--secondary));
      border: none;
      border-radius: 50px;
      padding: 12px 30px;
      font-weight: 600;
      transition: all 0.3s ease;
      width: 100%;
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }
    
    .btn-primary::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }
    
    .btn-primary:hover::before {
      left: 100%;
    }
    
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
    }
    
    .login-link {
      text-align: center;
      margin-top: 20px;
      color: #6c757d;
    }
    
    .login-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      position: relative;
    }
    
    .login-link a::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--primary);
      transition: width 0.3s ease;
    }
    
    .login-link a:hover::after {
      width: 100%;
    }
    
    .alert {
      border-radius: 10px;
      border: none;
      animation: slideIn 0.5s ease-out;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .feature-highlights {
      display: flex;
      justify-content: space-around;
      margin-top: 20px;
      text-align: center;
    }
    
    .feature {
      flex: 1;
      padding: 10px;
    }
    
    .feature i {
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 5px;
      display: block;
    }
    
    .feature span {
      font-size: 0.8rem;
      color: #6c757d;
    }
    
    /* Responsive adjustments */
    @media (max-width: 576px) {
      .card-body {
        padding: 20px;
      }
      
      .logo {
        font-size: 2.5rem;
      }
      
      .card-title {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <!-- Animated background shapes -->
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
  </div>

  <div class="container">
    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for msg in messages %}
          <div class="alert alert-warning alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-triangle me-2"></i> {{ msg }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="card">
      <div class="card-header">
        <i class="fas fa-utensils logo"></i>
        <h2 class="card-title">Create Account</h2>
        <p class="card-subtitle">Join AI Food Hygiene Checker today</p>
      </div>
      
      <div class="card-body">
        <form method="POST" id="registerForm">
          <div class="mb-3">
            <label class="form-label"><i class="fas fa-user"></i> Username</label>
            <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
          </div>
          
          <div class="mb-3">
            <label class="form-label"><i class="fas fa-lock"></i> Password</label>
            <div class="input-group">
              <input type="password" name="password" id="password" class="form-control" placeholder="Enter your password" required>
              <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                <i class="fas fa-eye" id="eyeIcon"></i>
              </button>
            </div>
            
            <div class="password-requirements">
              <div class="requirement unmet" id="lengthReq">
                <i class="fas fa-circle"></i> 6-8 characters
              </div>
              <div class="requirement unmet" id="specialReq">
                <i class="fas fa-circle"></i> At least one special character
              </div>
            </div>
          </div>
          
          <button type="submit" class="btn btn-primary" id="submitBtn">
            <i class="fas fa-user-plus me-2"></i> Create Account
          </button>
        </form>
        
        <div class="login-link">
          Already have an account? <a href="{{ url_for('login') }}">Sign in here</a>
        </div>
        
        <div class="feature-highlights">
          <div class="feature">
            <i class="fas fa-shield-alt"></i>
            <span>Secure</span>
          </div>
          <div class="feature">
            <i class="fas fa-bolt"></i>
            <span>Fast</span>
          </div>
          <div class="feature">
            <i class="fas fa-chart-line"></i>
            <span>Analytics</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Password visibility toggle
    function togglePassword() {
      const passwordInput = document.getElementById("password");
      const eyeIcon = document.getElementById("eyeIcon");
      
      if (passwordInput.type === "password") {
        passwordInput.type = "text";
        eyeIcon.className = "fas fa-eye-slash";
      } else {
        passwordInput.type = "password";
        eyeIcon.className = "fas fa-eye";
      }
    }
    
    // Password requirement validation
    document.getElementById('password').addEventListener('input', function() {
      const password = this.value;
      const lengthReq = document.getElementById('lengthReq');
      const specialReq = document.getElementById('specialReq');
      
      // Check length requirement
      if (password.length >= 6 && password.length <= 12) {
        lengthReq.classList.remove('unmet');
        lengthReq.classList.add('met');
        lengthReq.innerHTML = '<i class="fas fa-check-circle"></i> 6-12 characters';
      } else {
        lengthReq.classList.remove('met');
        lengthReq.classList.add('unmet');
        lengthReq.innerHTML = '<i class="fas fa-circle"></i> 6-12 characters';
      }
      
      // Check special character requirement
      if (/[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)) {
        specialReq.classList.remove('unmet');
        specialReq.classList.add('met');
        specialReq.innerHTML = '<i class="fas fa-check-circle"></i> At least one special character';
      } else {
        specialReq.classList.remove('met');
        specialReq.classList.add('unmet');
        specialReq.innerHTML = '<i class="fas fa-circle"></i> At least one special character';
      }
    });
    
    // Form submission animation
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      const submitBtn = document.getElementById('submitBtn');
      const originalText = submitBtn.innerHTML;
      
      submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Creating Account...';
      submitBtn.disabled = true;
      
      // Re-enable after 3 seconds (in case of error)
      setTimeout(() => {
        submitBtn.innerHTML = originalText;
        submitBtn.disabled = false;
      }, 3000);
    });
    
    // Add input focus effects
    const inputs = document.querySelectorAll('.form-control');
    inputs.forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.classList.add('focused');
      });
      
      input.addEventListener('blur', function() {
        this.parentElement.classList.remove('focused');
      });
    });
  </script>
</body>
</html>
